<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="calculator">
      <!-- Display -->
      <div class="display" id="display">0</div>

      <!-- Buttons -->
      <div class="buttons">
        <!-- Clear buttons -->
        <button class="clear">C</button>
        <button class="clearAll">AC</button>

        <!-- Operators -->
        <button>/</button>
        <button>*</button>
        <button>-</button>
        <button>+</button>

        <!-- Numbers -->
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>0</button>
        <button>.</button>

        <!-- Equal -->
        <button class="equal">=</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
